name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install PowerShell
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          . /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Install shfmt
        run: |
          set -e
          curl -fsSL -o /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
          shfmt -version

      - name: Build dist/
        run: node scripts/build-release.cjs

      - name: Verify shell dist scripts
        run: |
          set -e
          shopt -s nullglob
          for f in dist/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Verify PowerShell dist scripts
        shell: pwsh
        run: pwsh -NoProfile -File scripts/verify-dist-ps1-parse.ps1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:?}"
          ls -la dist/

          # 判断是否为预发布版本
          prerelease_flag=""
          if [[ "$tag" =~ -(alpha|beta|rc) ]]; then
            prerelease_flag="--prerelease"
            echo "检测到预发布版本标记，将设置为 Pre-release"
          fi

          # 读取 annotated tag 的附注信息
          echo "=== Debug: 尝试读取 tag $tag 的附注 ==="
          git tag -l --format='%(contents)' "$tag" || echo "命令失败"
          echo "=== Debug: 列出所有 tags ==="
          git tag -l
          notes="$(git tag -l --format='%(contents)' "$tag" 2>/dev/null || true)"
          echo "=== Debug: notes 内容 ==="
          echo "$notes"

          if [ -n "${notes:-}" ] && [ "$notes" != "$tag" ]; then
            echo "使用 tag 附注作为 release 描述"
            gh release create "$tag" $prerelease_flag --notes "$notes" dist/*
          else
            echo "未找到 tag 附注，使用自动生成描述"
            gh release create "$tag" $prerelease_flag --generate-notes dist/*
          fi

      - name: Upload to Alibaba Cloud OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:?}"

          OSSUTIL_URL="https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip"
          curl -fsSL -o /tmp/ossutil.zip "$OSSUTIL_URL"
          unzip -oj /tmp/ossutil.zip -d /tmp/ossutil
          chmod +x /tmp/ossutil/ossutil

          /tmp/ossutil/ossutil cp -r -f -e "$OSS_ENDPOINT" dist/ "oss://${OSS_BUCKET}/scripts/${tag}/"

          echo "=== OSS 下载地址 ==="
          for f in dist/*; do
            filename="$(basename "$f")"
            echo "https://${OSS_BUCKET}.${OSS_ENDPOINT}/scripts/${tag}/${filename}"
          done
